      h1 {

      p {

      div {
          width: 500px;

          padding-bottom: 1px;
          border-radius: 20px;
          box-shadow: 0 0px 8px 2px rgba(0,0,0,0.2)
      }


      a {
          font-family: Courier New;

      video {
          width: 500px;

          border-top-right-radius: 20px;
      }
  </style>
  <script>
    function torch(){
      try {
        let on = false;
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(device => device.kind === "videoinput");
        const backCam = cameras[cameras.length - 1];

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            deviceId: backCamera.deviceId,
            facingMode: "environment"
          }
        });

        let track = stream.getVideoTracks()[0];

        // Now time for actually controlling the torch!

        const socket = new WebSocket('wss://ntfy.sh/PinkSharpieTrigger/ws');

        socket.addEventListener('message', async (event) {
          try {
            on = !on;
            console.log(on);
            await track.applyConstraints({
              advanced: [torch: on]
            });
          }
        });
      }
    }
  </script>
</head>
<body>
  <div color="blue" onclick="torch();">Button</div>
</body>
